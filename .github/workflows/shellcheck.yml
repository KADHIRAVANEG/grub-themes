name: ShellCheck

on:
  push:
    paths:
      - 'install.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'install.sh'

jobs:
  shellcheck:
    name: Lint install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          # SC2034 = unused variable (false positives on colour vars when TTY check strips them)
          ignore_codes: SC2034
